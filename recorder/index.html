<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ozni — Gravador de campo</title>
<style>
  :root{
    --bg:#0f1115; --card:#1a1d24; --ink:#f2f4f8; --muted:#9aa3b2;
    --accent:#3b82f6; --danger:#ef4444; --ok:#22c55e; --amber:#f59e0b; --line:#2a2e38;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;-webkit-text-size-adjust:100%}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 60px}
  header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;padding:8px 0 14px}
  h1{font-size:18px;margin:0;font-weight:700;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:13px;margin:3px 0 0}
  .ver{color:var(--muted);font-size:11px;margin:4px 0 0;font-variant-numeric:tabular-nums;opacity:.7}
  .toggles{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
  .seg{display:flex;gap:4px}
  .seg button{background:var(--card);border:1px solid var(--line);color:var(--muted);
    border-radius:7px;padding:5px 10px;font-size:13px;font-weight:600;cursor:pointer}
  .seg button.on{color:var(--ink);border-color:var(--accent)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:12px 0}
  .card h2{font-size:14px;margin:0 0 10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  ul.rules{margin:0;padding-left:18px}
  ul.rules li{margin:5px 0;font-size:14px}
  ul.rules b{color:var(--amber)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:6px 4px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600}
  td.n,th.n{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
  .label-row{display:flex;gap:8px;margin-bottom:10px}
  .label-row input{flex:1;background:#11141a;border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:11px 12px;font-size:16px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
  .chips button{background:#11141a;border:1px solid var(--line);color:var(--muted);
    border-radius:20px;padding:6px 12px;font-size:13px;cursor:pointer}
  .chips button:active{border-color:var(--accent);color:var(--ink)}
  .meter{height:14px;background:#11141a;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .meter > div{height:100%;width:0;background:var(--ok);transition:width .06s linear}
  .meter.clip > div{background:var(--danger)}
  .meterrow{display:flex;justify-content:space-between;font-size:12px;margin-top:5px;color:var(--muted)}
  .clipwarn{color:var(--danger);font-weight:700;display:none}
  .meter.clip ~ .meterrow .clipwarn{display:inline}
  .timer{font-size:40px;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;margin:14px 0 6px}
  .recbtn{display:block;margin:0 auto;width:96px;height:96px;border-radius:50%;border:none;
    background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  .recbtn.rec{background:var(--danger)}
  .err{color:var(--danger);font-size:13px;margin-top:10px;text-align:center}
  .rec{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .rec .nm{flex:1;font-size:13px;word-break:break-all}
  .rec .du{color:var(--muted);font-size:12px;font-variant-numeric:tabular-nums}
  .rec button{background:var(--accent);border:none;color:#fff;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .rec button.sec{background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 10px}
  .empty{color:var(--muted);font-size:13px}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:18px}
  .note{color:var(--amber);font-size:12.5px;margin:10px 0 0;line-height:1.45}
  .rec button.cloud{background:var(--accent);font-weight:700;padding:9px 12px}
  .rec button.cloud.ok{background:var(--ok)}
  .rec button.cloud.fail{background:var(--danger)}
  .rec button.cloud.off{background:var(--amber);color:#1a1d24}
  .consent{color:var(--muted);font-size:12px;margin:8px 0 0;line-height:1.45}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 id="title"></h1>
      <p class="sub" id="sub"></p>
      <p class="ver" id="ver"></p>
    </div>
    <div class="toggles">
      <div class="seg" id="modeseg">
        <button data-mode="fogos" onclick="setMode('fogos')">🎆</button>
        <button data-mode="tiro" onclick="setMode('tiro')">🎯</button>
      </div>
      <div class="seg" id="langseg">

        <button data-lang="en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </header>

  <div class="card"><h2 id="h-rules"></h2><ul class="rules" id="rules"></ul></div>
  <div class="card"><h2 id="h-plan"></h2><table><thead id="planhead"></thead><tbody id="planbody"></tbody></table></div>

  <div class="card">
    <h2 id="h-rec"></h2>
    <div class="label-row"><input id="label" autocapitalize="off" autocorrect="off" spellcheck="false"></div>
    <div class="chips" id="chips"></div>
    <div class="meter" id="meter"><div id="meterbar"></div></div>
    <div class="meterrow">
      <span id="db">–∞ dB</span>
      <span class="clipwarn" id="clipwarn"></span>
      <span id="pk"></span>
    </div>
    <div class="timer" id="timer">00:00</div>
    <button class="recbtn" id="recbtn" onclick="toggle()"></button>
    <div class="err" id="err"></div>
  </div>

  <div class="card" style="text-align:center;padding:12px 16px"><button id="sharelink" onclick="shareRecorderLink()" style="background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:9px 18px;font-size:14px;font-weight:600;cursor:pointer;width:100%"></button></div>

  <p class="foot" id="foot"></p>

// ---- recorder ----
let ctx, stream, source, processor, zero;
let recording=false, recRate=48000, startMs=0, timerId=null, sessionPeak=0;
let capturedSamples=0, lastAudioMs=0;
let wakeLock=null, visHandlerBound=false;
let recs = [];

// ---- lazy IndexedDB (guarded: never accessed at top level — Node verify shim has no indexedDB) ----
const DB_NAME = "ozni-rec", DB_VER = 1;
let _dbPromise = null;
function dbReady(){
  if(typeof indexedDB === "undefined") return Promise.resolve(null);   // Node shim / unsupported browser
  if(_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve)=>{
    let req;
    try{ req = indexedDB.open(DB_NAME, DB_VER); }
    catch(e){ resolve(null); return; }
    req.onupgradeneeded = ()=>{
      const db = req.result;
      if(!db.objectStoreNames.contains("sessions"))   db.createObjectStore("sessions",   {keyPath:"sessionId"});
      if(!db.objectStoreNames.contains("chunks"))     db.createObjectStore("chunks",     {keyPath:["sessionId","seq"]});
      if(!db.objectStoreNames.contains("recordings")) db.createObjectStore("recordings", {keyPath:"id"});
    };
    req.onsuccess = ()=> resolve(req.result);
    req.onerror   = ()=>{ resolve(null); };   // degrade gracefully — never throw out of here
  });
  return _dbPromise;
}
// Promise-wrap a single IDB request; resolves on success, rejects on error (caller try/catch handles quota).
function idbReq(req){ return new Promise((res,rej)=>{ req.onsuccess=()=>res(req.result); req.onerror=()=>rej(req.error); }); }

function f32ToI16(f32){ const out=new Int16Array(f32.length);
  for(let i=0;i<f32.length;i++){ let s=Math.max(-1,Math.min(1,f32[i])); out[i]= s<0 ? s*0x8000 : s*0x7FFF; } return out; }

// ---- durable session state ----
let sessionId="", chunkSeq=0, pendingI16=[], pendingLen=0, memChunks=[];

function flushPending(){
  if(pendingLen===0) return;
  let merged=new Int16Array(pendingLen), o=0;
  for(const c of pendingI16){ merged.set(c,o); o+=c.length; }
  pendingI16=[]; pendingLen=0;
  const seq=chunkSeq++; const sid=sessionId;
  dbReady().then(db=>{ if(!db){ memChunks.push({seq, buf:merged}); return; }   // no IDB -> retain in memory so stop() can still build the full clip
    try{
      const tx=db.transaction("chunks","readwrite");
      tx.objectStore("chunks").put({sessionId:sid, seq, buf:merged});
      tx.onerror=()=>handleIdbError(tx.error);   // quota etc.
    }catch(e){ handleIdbError(e); }
  });
}

function handleIdbError(e){
  if(e && (e.name==="QuotaExceededError" || (e.message||"").indexOf("quota")>=0)){
    el("err").textContent = tt(STR.quota);   // bilingual; prior data intact; recording continues
  }
  // any other IDB error: stay silent in UI (best-effort durability) — do NOT throw out of the audio path
}

// ---- WAV assembler from Int16 chunks (byte-equivalent to encodeWAV) ----
function wavHeader(numSamples, rate){
  const buf=new ArrayBuffer(44), v=new DataView(buf);
  const ws=(off,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(off+i, s.charCodeAt(i)); };
  ws(0,"RIFF"); v.setUint32(4,36+numSamples*2,true); ws(8,"WAVE"); ws(12,"fmt ");
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,"data"); v.setUint32(40,numSamples*2,true);
  return buf;   // ArrayBuffer
}
// Assemble a WAV Blob from chunk records (each {seq, buf:Int16Array}) sorted by seq.
function chunksToWavBlob(chunkRecs, rate){
  chunkRecs.sort((a,b)=>a.seq-b.seq);
  let total=0; for(const c of chunkRecs) total += c.buf.length;
  const parts=[wavHeader(total, rate)];
  for(const c of chunkRecs) parts.push(c.buf.buffer);   // Int16 little-endian == WAV PCM byte order
  return { blob:new Blob(parts,{type:"audio/wav"}), samples:total };
}
// Read all chunks for a session (returns []).
async function readChunks(db, sid){
  return new Promise((resolve)=>{ const out=[];
    try{
      const store=db.transaction("chunks","readonly").objectStore("chunks");
      const range=IDBKeyRange.bound([sid,-Infinity],[sid,Infinity]);
      const req=store.openCursor(range);
      req.onsuccess=()=>{ const cur=req.result; if(cur){ out.push(cur.value); cur.continue(); } else resolve(out); };
      req.onerror=()=>resolve(out);
    }catch(e){ resolve(out); }
  });
}
async function deleteSessionChunks(db, sid){
  return new Promise((resolve)=>{ try{
    const store=db.transaction("chunks","readwrite").objectStore("chunks");
    const range=IDBKeyRange.bound([sid,-Infinity],[sid,Infinity]);
    const req=store.openCursor(range);
    req.onsuccess=()=>{ const cur=req.result; if(cur){ cur.delete(); cur.continue(); } else resolve(); };
    req.onerror=()=>resolve();
  }catch(e){ resolve(); } });
}

async function acquireWakeLock(){
  if(!('wakeLock' in navigator)){ el("err").textContent = tt(STR.keepawake); return; }
  try{ wakeLock = await navigator.wakeLock.request('screen'); }
  catch(e){ /* request() can reject if the doc isn't focused — non-fatal, keep recording */ }
}

function setRecUI(){
  el("recbtn").textContent = recording ? tt(STR.stop) : tt(STR.rec);
  el("recbtn").classList.toggle("rec", recording);
}
function toggle(){ recording ? stop() : start(); }

async function start(){
  el("err").textContent="";
  try{
    stream = await navigator.mediaDevices.getUserMedia({ audio:{
      echoCancellation:false, noiseSuppression:false, autoGainControl:false, channelCount:1 }});
  }catch(e){ el("err").textContent = tt(STR.micblock)+e.message; return; }
  ctx = new (window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==="suspended") await ctx.resume();
  recRate = ctx.sampleRate;
  source = ctx.createMediaStreamSource(stream);
  processor = ctx.createScriptProcessor(4096,1,1);
  zero = ctx.createGain(); zero.gain.value = 0;
  sessionPeak=0; capturedSamples=0; lastAudioMs=Date.now();
  const label=(el("label").value||"rec").replace(/\s+/g,"-");
  sessionId = String(Date.now())+"_"+label;
  chunkSeq=0; pendingI16=[]; pendingLen=0; memChunks=[];
  dbReady().then(db=>{ if(!db) return;
    try{ db.transaction("sessions","readwrite").objectStore("sessions")
          .put({sessionId, rate:recRate, label, ts:Date.now(), done:false}); }catch(e){}
  });
  processor.onaudioprocess = (e)=>{
    const inp = e.inputBuffer.getChannelData(0);
    const i16 = f32ToI16(inp);
    pendingI16.push(i16); pendingLen += i16.length;
    capturedSamples += inp.length; lastAudioMs = Date.now();
    if(pendingLen >= recRate){ flushPending(); }   // ~1s of audio -> persist a chunk
    if(el("err").textContent) el("err").textContent="";
    let pk=0,sum=0; for(let i=0;i<inp.length;i++){ const v=Math.abs(inp[i]); if(v>pk)pk=v; sum+=inp[i]*inp[i]; }
    const rms=Math.sqrt(sum/inp.length); if(pk>sessionPeak)sessionPeak=pk;
    const db = rms>1e-6 ? Math.round(20*Math.log10(rms)) : -120;
    el("meterbar").style.width = Math.min(100,Math.max(0,(db+60)/60*100))+"%";
    el("meter").classList.toggle("clip", pk>=0.99);
    el("db").textContent = (db<=-120?"–∞":db)+" dB";
    el("pk").textContent = tt(STR.peak)+" "+Math.round(Math.min(1,sessionPeak)*100)+"%";
  };
  source.connect(processor); processor.connect(zero); zero.connect(ctx.destination);
  recording=true; startMs=Date.now(); setRecUI();
  acquireWakeLock();
  if(!visHandlerBound){ visHandlerBound=true; document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible' && recording) acquireWakeLock(); }); }
  ctx.onstatechange = ()=>{ if(recording && (ctx.state==='suspended'||ctx.state==='interrupted')){ ctx.resume().catch(()=>{}); } };
  timerId=setInterval(()=>{ const s=Math.floor(capturedSamples/recRate);
    el("timer").textContent=String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
    if(recording && Date.now()-lastAudioMs > 1500){ el("err").textContent = tt(STR.stall); }
  },200);
}

async function stop(){
  recording=false; clearInterval(timerId);
  try{ processor.disconnect(); source.disconnect(); zero.disconnect(); }catch(e){}
  stream.getTracks().forEach(t=>t.stop());
  ctx.close();
  flushPending();   // (a) flush final pending batch into chunks
  setRecUI();
  el("err").textContent=""; el("meterbar").style.width="0"; el("meter").classList.remove("clip"); el("timer").textContent="00:00";

  const label=(el("label").value||"rec").replace(/\s+/g,"-");
  const stamp=new Date().toISOString().replace(/[-:T]/g,"").slice(0,15);
  const name=`ozni_${label}_${stamp}_${recRate}hz.wav`;
  const sid=sessionId;

  const db=await dbReady();
  if(db){
    try{
      const recsForSession=await readChunks(db, sid);          // (b) read chunks back in seq order
      const {blob, samples}=chunksToWavBlob(recsForSession, recRate);
      const rec={ id:sid, name, blob, dur:samples/recRate, rate:recRate, done:true, ts:Date.now() };
      await idbReq(db.transaction("recordings","readwrite").objectStore("recordings").put(rec));  // (c) persist finalized
      // (d) mark session done + delete its chunks
      try{ db.transaction("sessions","readwrite").objectStore("sessions").put({sessionId:sid, rate:recRate, label, ts:Date.now(), done:true}); }catch(e){}
      await deleteSessionChunks(db, sid);
      recs.unshift({blob:rec.blob, name:rec.name, dur:rec.dur, id:rec.id, uploaded:false});  // in-memory list mirrors persisted
    }catch(e){ handleIdbError(e); }
  } else {
    // No IDB (e.g. private mode without storage): assemble from the in-memory fallback chunks
    // that flushPending retained, so the user still gets the FULL clip (not just the last batch).
    const {blob, samples}=chunksToWavBlob(memChunks.slice(), recRate);
    recs.unshift({blob, name, dur: samples ? samples/recRate : capturedSamples/recRate, id:sid, uploaded:false});
  }
  renderList();   // (e) render BEFORE releasing the lock
  // (f) ONLY NOW release the wake lock — last.
  if(wakeLock){ try{ await wakeLock.release(); }catch(e){} wakeLock=null; }
}

function flatten(chunks){ let len=0; for(const c of chunks) len+=c.length;
  const out=new Float32Array(len); let o=0; for(const c of chunks){ out.set(c,o); o+=c.length; } return out; }

function encodeWAV(samples, rate){
  const buf=new ArrayBuffer(44+samples.length*2); const v=new DataView(buf);
  const ws=(off,s)=>{ for(let i=0;i<s.length;i++) v.setUint8(off+i, s.charCodeAt(i)); };
  ws(0,"RIFF"); v.setUint32(4,36+samples.length*2,true); ws(8,"WAVE"); ws(12,"fmt ");
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,rate,true); v.setUint32(28,rate*2,true); v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,"data"); v.setUint32(40,samples.length*2,true);
  let off=44; for(let i=0;i<samples.length;i++){ let s=Math.max(-1,Math.min(1,samples[i]));
    v.setInt16(off, s<0?s*0x8000:s*0x7FFF, true); off+=2; }
  return new Blob([v],{type:"audio/wav"});
}

// ---- CRC-32 (standard reflected polynomial 0xEDB88320) ----
// Used only by makeStoredZip. Both functions use ONLY ArrayBuffer/DataView/Uint8Array/Blob
// so they are safe to define and call inside the Node verify shim (no browser-only APIs).
const CRC32_TABLE = (()=>{
  const t=new Uint32Array(256);
  for(let i=0;i<256;i++){
    let c=i;
    for(let k=0;k<8;k++) c = (c&1) ? (0xEDB88320 ^ (c>>>1)) : (c>>>1);
    t[i]=c;
  }
  return t;
})();
function crc32(u8){
  let c=0xFFFFFFFF;
  for(let i=0;i<u8.length;i++) c = (c>>>8) ^ CRC32_TABLE[(c ^ u8[i]) & 0xFF];
  return (c ^ 0xFFFFFFFF) >>> 0;
}

// Build a minimal STORED (method 0) zip containing exactly one entry.
// STORE (method 0) is deliberate: WhatsApp ships .zip documents byte-for-byte, so the
// uncompressed WAV inside survives the transfer without any re-encoding.
// bytes: Uint8Array of file bytes (e.g. WAV). Returns a single-part Blob "application/zip".
function makeStoredZip(filename, bytes){
  const size = bytes.length;
  const crc  = crc32(bytes);
  // Encode filename — TextEncoder is a standard global in both browser and Node (not DOM).
  const nameBytes = new TextEncoder().encode(filename);
  const nameLen   = nameBytes.length;

  // Exact total: LocalHeader(30) + name + data + CentralHeader(46) + name + EOCD(22)
  const localStart    = 0;
  const dataStart     = 30 + nameLen;
  const cdStart       = dataStart + size;
  const eocdStart     = cdStart + 46 + nameLen;
  const totalLen      = eocdStart + 22;

  const buf = new ArrayBuffer(totalLen);
  const v   = new DataView(buf);
  const u8  = new Uint8Array(buf);

  // Local File Header
  v.setUint32(localStart +  0, 0x04034b50, true); // signature PK\x03\x04
  v.setUint16(localStart +  4, 20,          true); // version needed: 2.0
  v.setUint16(localStart +  6, 0,           true); // flags
  v.setUint16(localStart +  8, 0,           true); // method: STORE (0)
  v.setUint16(localStart + 10, 0,           true); // mod time
  v.setUint16(localStart + 12, 0,           true); // mod date
  v.setUint32(localStart + 14, crc,         true); // CRC-32
  v.setUint32(localStart + 18, size,        true); // compressed size
  v.setUint32(localStart + 22, size,        true); // uncompressed size
  v.setUint16(localStart + 26, nameLen,     true); // file name length
  v.setUint16(localStart + 28, 0,           true); // extra field length
  u8.set(nameBytes, localStart + 30);               // file name bytes
  u8.set(bytes,     dataStart);                     // file data (verbatim, no inflate)

  // Central Directory File Header
  v.setUint32(cdStart +  0, 0x02014b50, true); // signature PK\x01\x02
  v.setUint16(cdStart +  4, 20,          true); // version made by
  v.setUint16(cdStart +  6, 20,          true); // version needed
  v.setUint16(cdStart +  8, 0,           true); // flags
  v.setUint16(cdStart + 10, 0,           true); // method: STORE (0)
  v.setUint16(cdStart + 12, 0,           true); // mod time
  v.setUint16(cdStart + 14, 0,           true); // mod date
  v.setUint32(cdStart + 16, crc,         true); // CRC-32
  v.setUint32(cdStart + 20, size,        true); // compressed size
  v.setUint32(cdStart + 24, size,        true); // uncompressed size
  v.setUint16(cdStart + 28, nameLen,     true); // file name length
  v.setUint16(cdStart + 30, 0,           true); // extra field length
  v.setUint16(cdStart + 32, 0,           true); // file comment length
  v.setUint16(cdStart + 34, 0,           true); // disk number start
  v.setUint16(cdStart + 36, 0,           true); // internal file attributes
  v.setUint32(cdStart + 38, 0,           true); // external file attributes
  v.setUint32(cdStart + 42, 0,           true); // relative offset of local header
  u8.set(nameBytes, cdStart + 46);               // file name bytes

  // End Of Central Directory
  v.setUint32(eocdStart +  0, 0x06054b50, true); // signature PK\x05\x06
  v.setUint16(eocdStart +  4, 0,           true); // disk number
  v.setUint16(eocdStart +  6, 0,           true); // disk with cd start
  v.setUint16(eocdStart +  8, 1,           true); // cd records on this disk
  v.setUint16(eocdStart + 10, 1,           true); // total cd records
  v.setUint32(eocdStart + 12, 46 + nameLen,true); // size of central directory
  v.setUint32(eocdStart + 16, cdStart,     true); // offset of cd start
  v.setUint16(eocdStart + 20, 0,           true); // zip file comment length

  // Single-part, exactly-sized buffer — required so the Node shim Blob captures all bytes.
  return new Blob([new Uint8Array(buf)], {type:"application/zip"});
}

// ---- deviceId (localStorage inside the function — never accessed at top level) ----
function getDeviceId(){
  try{
    let id = localStorage.getItem("ozni_device_id");
    if(!id){ id = (crypto.randomUUID ? crypto.randomUUID() : String(Date.now())+"-"+Math.random().toString(16).slice(2)); localStorage.setItem("ozni_device_id", id); }
    return id;
  }catch(e){ return "nodevice"; }   // private mode without storage — still uploads, just unnamespaced
}

// ---- uploadRecording: vanilla fetch, NO supabase-js. Returns {ok, status}.
// Retries up to 2 extra attempts (3 total) with backoff on network error or 5xx;
// does NOT retry on 4xx (bad request/policy — surface immediately).
// All browser APIs (fetch, localStorage, crypto, setTimeout) are INSIDE function bodies
// so they are never accessed during the Node shim eval. ----
async function uploadRecording(rec){
  const deviceId = getDeviceId();
  const path = `${UPLOAD.url}/storage/v1/object/${UPLOAD.bucket}/${deviceId}/${encodeURIComponent(rec.name)}`;
  const headers = { "Authorization":`Bearer ${UPLOAD.anonKey}`, "apikey":UPLOAD.anonKey, "Content-Type":"audio/wav" };  // no x-upsert: insert-only RLS policy needs no UPDATE; paths are unique (deviceId + timestamp)
  let lastStatus = 0;
  for(let attempt=0; attempt<3; attempt++){
    try{
      const res = await fetch(path, { method:"POST", headers, body:rec.blob });
      lastStatus = res.status;
      if(res.status===200 || res.status===201) return {ok:true, status:res.status};
      if(res.status>=400 && res.status<500) return {ok:false, status:res.status};   // policy/auth — no retry
    }catch(e){ lastStatus = 0; }   // network error → retry
    if(attempt<2) await new Promise(r=>setTimeout(r, 800*(attempt+1)));   // backoff
  }
  return {ok:false, status:lastStatus};
}

function renderList(){
  const list=el("list");
  if(recs.length===0){ list.innerHTML = `<p class="empty">${tt(STR.empty)}</p>`; return; }
  list.innerHTML="";
  recs.forEach((r,i)=>{
    const row=document.createElement("div"); row.className="rec";
    row.innerHTML = `<span class="nm">${r.name}</span><span class="du">${r.dur.toFixed(1)}s</span>`;
    if(UPLOAD_ENABLED){
      const cloud=document.createElement("button"); cloud.className="cloud";
      if(r.uploaded){ cloud.classList.add("ok"); cloud.textContent=tt(STR.uploadDone); cloud.disabled=true; }
      else { cloud.textContent=tt(STR.uploadIdle); cloud.onclick=()=>doUpload(i, cloud); }
      row.appendChild(cloud);
    }
    const zipBtn=document.createElement("button"); zipBtn.className="sec"; zipBtn.textContent=tt(STR.zipFallback); zipBtn.onclick=()=>share(i); row.appendChild(zipBtn);
    const wavBtn=document.createElement("button"); wavBtn.className="sec"; wavBtn.textContent=tt(STR.wav); wavBtn.onclick=()=>shareWav(i); row.appendChild(wavBtn);
    list.appendChild(row);
  });
}

// ---- doUpload: drives the cloud button through dummy-proof states.
// NEVER deletes or modifies the recording on failure — the clip stays in IDB and zip/WAV remain. ----
async function doUpload(i, btn){
  if(typeof navigator!=="undefined" && navigator.onLine===false){
    btn.className="cloud off"; btn.textContent=tt(STR.uploadOffline); return;   // recording untouched
  }
  btn.disabled=true; btn.className="cloud"; btn.textContent=tt(STR.uploadSending);
  const res = await uploadRecording(recs[i]);
  if(res.ok){
    recs[i].uploaded=true;
    btn.className="cloud ok"; btn.textContent=tt(STR.uploadDone);   // stays disabled
    await markUploaded(recs[i].id);   // persist; recording stays in store regardless
  } else {
    btn.disabled=false; btn.className="cloud fail"; btn.textContent=tt(STR.uploadFail);
    btn.onclick=()=>doUpload(i, btn);   // tappable retry; clip never removed
  }
}

// ---- markUploaded: read-modify-write the IDB recordings record (guard for no-IDB). ----
async function markUploaded(id){
  if(!id) return;
  const db=await dbReady(); if(!db) return;
  try{
    const store=db.transaction("recordings","readwrite").objectStore("recordings");
    const rec=await idbReq(store.get(id));
    if(rec){ rec.uploaded=true; await idbReq(db.transaction("recordings","readwrite").objectStore("recordings").put(rec)); }
  }catch(e){ /* persistence is best-effort; the ✅ for this session still shows from recs[i].uploaded */ }
}

// Primary share: wrap recording in a STORED zip so WhatsApp treats it as a document
// and delivers it byte-for-byte (WhatsApp transcodes raw audio to Opus, destroying quality).
async function share(i){
  const r=recs[i];
  const wavBytes=new Uint8Array(await r.blob.arrayBuffer());
  const zipBlob=makeStoredZip(r.name, wavBytes);
  const zipName=r.name.replace(/\.wav$/i,"")+".zip";
  const file=new File([zipBlob], zipName, {type:"application/zip"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:zipName}); return; }catch(e){ if(e.name==="AbortError")return; }
  }
  const a=document.createElement("a"); a.href=URL.createObjectURL(zipBlob); a.download=zipName;
  document.body.appendChild(a); a.click(); a.remove();
}

// Secondary share: raw WAV — for the user's own AirDrop-to-Mac / email flow.
async function shareWav(i){
  const r=recs[i]; const file=new File([r.blob], r.name, {type:"audio/wav"});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:r.name}); return; }catch(e){ if(e.name==="AbortError")return; }
  }
  const a=document.createElement("a"); a.href=URL.createObjectURL(r.blob); a.download=r.name;
  document.body.appendChild(a); a.click(); a.remove();
}

// Share the recorder page URL with a bilingual invite; clipboard fallback shows a notice.
async function shareRecorderLink(){
  const url=location.href;
  if(navigator.share){
    try{ await navigator.share({title:tt(STR.inviteTitle), text:tt(STR.invite), url}); return; }catch(e){ if(e.name==="AbortError")return; }
  }
  try{ await navigator.clipboard.writeText(url); el("err").textContent=tt(STR.linkCopied); }catch(e){}
}

el("label").value = MODES[state.mode].label0;
render();

async function init(){
  const db=await dbReady(); if(!db) return;   // Node shim / no IDB -> nothing to load
  try{
    // load finalized recordings -> recs[] (survive reloads)
    const finalized=await idbReq(db.transaction("recordings","readonly").objectStore("recordings").getAll());
    finalized.sort((a,b)=>(b.ts||0)-(a.ts||0));
    for(const r of finalized) recs.push({blob:r.blob, name:r.name, dur:r.dur, id:r.id, uploaded:!!r.uploaded});
    // recover interrupted sessions (done:false)
    const sessions=await idbReq(db.transaction("sessions","readonly").objectStore("sessions").getAll());
    let recovered=0;
    for(const s of sessions){
      if(s.done) continue;
      const chunkRecs=await readChunks(db, s.sessionId);
      if(chunkRecs.length===0){ // nothing salvageable; clean up the stale session
        try{ db.transaction("sessions","readwrite").objectStore("sessions").delete(s.sessionId); }catch(e){}
        continue;
      }
      const {blob, samples}=chunksToWavBlob(chunkRecs, s.rate);
      const stamp=new Date(s.ts||Date.now()).toISOString().replace(/[-:T]/g,"").slice(0,15);
      const suffix = state.lang==="pt" ? "recuperado" : "recovered";
      const name=`ozni_${(s.label||"rec")}-${suffix}_${stamp}_${s.rate}hz.wav`;
      const id=s.sessionId+"_rec";
      try{ await idbReq(db.transaction("recordings","readwrite").objectStore("recordings").put({id, name, blob, dur:samples/s.rate, rate:s.rate, done:true, ts:s.ts||Date.now()})); }catch(e){ handleIdbError(e); }
      recs.unshift({blob, name, dur:samples/s.rate, id, uploaded:false});
      try{ db.transaction("sessions","readwrite").objectStore("sessions").put({...s, done:true}); }catch(e){}
      await deleteSessionChunks(db, s.sessionId);
      recovered++;
    }
    renderList();
    if(recovered>0){ el("err").textContent = tt(STR.recovered).replace("{n}", recovered); }
  }catch(e){ /* recovery is best-effort; never block the UI */ }
}
init();
</script>
